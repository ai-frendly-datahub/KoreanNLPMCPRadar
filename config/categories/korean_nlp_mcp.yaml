- id: mcp_candidate_chrisryugj_kordoc
  name: chrisryugj/kordoc
  type: mcp_server
  enabled: true
  url: https://github.com/chrisryugj/kordoc
  transport: stdio
  trust_tier: T4_community
  collection_tier: C4_mcp_tool
  content_type: mcp_tool_result
  risk_scope:
  - document_processing
  - local_file_read
  notes: Real stdio transport smoke test passed for read-only detect_format against
    repo-local fixture; enabled with a single allowlisted tool call.
  config:
    repository: chrisryugj/kordoc
    source_seed: awesome-mcp-korea
    source_section: Korean NLP & Language
    activation_status: real_transport_smoke_test_passed
    activation_audited_at: '2026-04-14T01:55:57.420863+00:00'
    real_transport_smoke_tested_at: '2026-04-14T04:35:00+00:00'
    metadata_checked_at: '2026-04-14T01:30:44.113793+00:00'
    github_archived: false
